<!DOCTYPE html>
<html>

<head>

<title>Simple Terrain Generator</title>

<style>

body{
    text-align:center;
    font-family:Arial;
    background:#f2f2f2;
}

canvas{
    border:1px solid black;
    margin-top:20px;
}

button{
    padding:10px;
    font-size:16px;
}

</style>

</head>

<body>

<h2>Simple Procedural Landscape</h2>

<button onclick="generateTerrain()">Generate Terrain</button>

<br>

<canvas id="terrain" width="500" height="300"></canvas>

<script>

let canvas = document.getElementById("terrain")
let ctx = canvas.getContext("2d")

function generateTerrain(){

    for(let x = 0; x < canvas.width; x++){

        let height = Math.random() * 150 + 50

        ctx.fillStyle = "green"

        ctx.fillRect(x, canvas.height - height, 1, height)

    }

}

generateTerrain()

</script>

</body>

</html>
